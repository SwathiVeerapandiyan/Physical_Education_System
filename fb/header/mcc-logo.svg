<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Shield -->
  <path d="M50,5 C25,5 20,25 20,50 C20,75 50,95 50,95 C50,95 80,75 80,50 C80,25 75,5 50,5 Z" fill="#800000" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Inner Shield -->
  <path d="M50,10 C29,10 25,28 25,50 C25,70 50,88 50,88 C50,88 75,70 75,50 C75,28 71,10 50,10 Z" fill="#ffffff" stroke="#D4AF37" stroke-width="1.5"/>
  
  <!-- Stylized Cross (Maroon) -->
  <rect x="47" y="18" width="6" height="42" fill="#800000" rx="1.5"/>
  <rect x="30" y="28" width="40" height="6" fill="#800000" rx="1.5"/>
  
  <!-- Open Book at bottom center representing learning/scripture -->
  <path d="M35,63 C40,60 48,62 50,65 C52,62 60,60 65,63 L65,74 C60,71 52,73 50,76 C48,73 40,71 35,74 Z" fill="#D4AF37" stroke="#800000" stroke-width="1"/>
  <line x1="50" y1="65" x2="50" y2="76" stroke="#800000" stroke-width="1"/>
  
  <!-- Golden Stars/Crown Accents -->
  <circle cx="50" cy="15" r="2.5" fill="#D4AF37"/>
  <circle cx="34" cy="22" r="2" fill="#D4AF37"/>
  <circle cx="66" cy="22" r="2" fill="#D4AF37"/>
  
  <!-- College Initials & Founded Year Text -->
  <text x="50" y="55" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="7" font-weight="900" fill="#800000" text-anchor="middle">MCC</text>
  <text x="50" y="84" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="5" font-weight="700" fill="#800000" text-anchor="middle">ESTD. 1837</text>
</svg>
