spring.application.name=pe

# H2 Embedded Datasource configuration (Default - allows running without local PostgreSQL)
spring.datasource.url=jdbc:h2:mem:sports_management;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Alternative PostgreSQL Datasource Configuration ---
# To use a local PostgreSQL database, uncomment the lines below:
# spring.datasource.url=jdbc:postgresql://localhost:5432/sports_management
# spring.datasource.username=postgres
# spring.datasource.password=123
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
